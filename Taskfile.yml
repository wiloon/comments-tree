version: '3'

tasks:
  default:
    cmds:
      - task --list

  api:
    desc: Start backend (Spring Boot)
    cmds:
      - mvn clean package -Dmaven.test.skip=true -DskipFrontend=true -pl comments-tree-api -am
      - java -jar comments-tree-api/target/comments-tree-api-1.0.0.jar

  ui:
    desc: Start frontend dev server (Vite on http://127.0.0.1:5173)
    dir: comments-tree-web
    cmds:
      - bash -c 'eval "$(fnm env --shell bash)" && fnm use 18.20.8 && if [ ! -d node_modules ]; then npm install --registry=https://registry.npmmirror.com; fi && npm run serve'

  ui-clean-vite:
    desc: Clear Vite caches (fixes ENOENT deps_temp / broken dev server)
    dir: comments-tree-web
    cmds:
      - rm -rf node_modules/.vite .vite-cache

  e2e:
    desc: Run Playwright e2e (requires task api only; Playwright builds and serves UI on port 4173)
    dir: comments-tree-web
    cmds:
      - bash -c 'eval "$(fnm env --shell bash)" && fnm use 18.20.8 && if [ ! -d node_modules/@playwright ]; then npm install --registry=https://registry.npmmirror.com && npx playwright install chromium; fi && npm run test:e2e:pw'

  e2e-install:
    desc: Install frontend deps and Playwright browsers (run once, or when package.json changes)
    dir: comments-tree-web
    cmds:
      - bash -c 'eval "$(fnm env --shell bash)" && fnm use 18.20.8 && npm install --registry=https://registry.npmmirror.com && npx playwright install chromium'

  build:
    desc: Build backend jar only (skip frontend and tests)
    cmds:
      - mvn clean package -Dmaven.test.skip=true -DskipFrontend=true -pl comments-tree-api -am

  build-full:
    desc: Build jar with frontend and backend bundled together (skip tests)
    cmds:
      - mvn clean package -Dmaven.test.skip=true -pl comments-tree-api -am

  test:
    desc: Run unit tests only
    cmds:
      - mvn test -pl comments-tree-api -am -DskipFrontend=true

  test-it:
    desc: Run integration tests only (requires unit tests to pass first)
    cmds:
      - mvn failsafe:integration-test failsafe:verify -pl comments-tree-api -am -DskipFrontend=true

  test-all:
    desc: Run unit + integration + e2e (start task api first; e2e starts its own UI preview on 4173 — task ui not required)
    cmds:
      - mvn test -pl comments-tree-api -am -DskipFrontend=true
      - mvn failsafe:integration-test failsafe:verify -pl comments-tree-api -am -DskipFrontend=true
      - task: e2e
